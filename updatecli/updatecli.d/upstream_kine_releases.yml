# Track upstream k3s-io/kine GitHub Releases and create notification PR
#
# Use case: loft-sh/kine is a fork with loft-sh additions (AWS RDS IAM auth,
# Kerberos/GSSAPI auth, and CI/release tooling). When upstream releases new
# versions, we need to:
#   1. Create a release branch from the upstream tag
#   2. Replay the full set of fork commits on top (see README "Fork policy")
#   3. Cut our own release
#
# This manifest watches for new GitHub Releases (not just tags) and creates a
# PR with instructions when a new release is detected.
#
# Why githubrelease vs gittag:
#   - k3s-io/kine publishes proper GitHub Releases with release notes and assets
#   - githubrelease only triggers on actual releases, not arbitrary tags
#   - Avoids false positives from internal/pre-release tags like v0.14.6-k3s1.32
---
name: "Track upstream kine releases"

scms:
  kine:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      username: "{{ requiredEnv .github.username }}"
      token: '{{ requiredEnv .github.token }}'
      owner: "loft-sh"
      repository: "kine"
      branch: "master"

sources:
  latestUpstreamRelease:
    name: "Get latest upstream kine GitHub Release"
    kind: "githubrelease"
    spec:
      owner: "k3s-io"
      repository: "kine"
      token: '{{ requiredEnv .github.token }}'
      username: "{{ requiredEnv .github.username }}"
      versionfilter:
        kind: "semver"
        pattern: ">=0.14.0"
    transformers:
      - trimprefix: "v"

conditions:
  versionDiffers:
    name: "Check if upstream version differs from tracked version"
    kind: "file"
    sourceid: "latestUpstreamRelease"
    spec:
      file: "updatecli/upstream-kine-version.txt"
    failwhen: true

targets:
  updateTrackedVersion:
    name: "Update tracked upstream kine version"
    kind: "file"
    scmid: "kine"
    sourceid: "latestUpstreamRelease"
    spec:
      file: "updatecli/upstream-kine-version.txt"

actions:
  github:
    kind: "github/pullrequest"
    scmid: "kine"
    title: 'chore: upstream kine v{{ source "latestUpstreamRelease" }} available'
    spec:
      automerge: false
      draft: false
      mergemethod: squash
      labels:
        - "upstream-release"
      description: |
        Upstream k3s-io/kine has released **v{{ source "latestUpstreamRelease" }}**.

        ## Release Notes

        See: https://github.com/k3s-io/kine/releases/tag/v{{ source "latestUpstreamRelease" }}

        ## Action Required

        Cut a fork release based on upstream **v{{ source "latestUpstreamRelease" }}**. Follow the
        "Fork policy" section in the README; the outline is:

        ```bash
        # Fetch upstream tags
        git fetch upstream --tags

        # Create the release branch from the upstream tag (NOT from master)
        git checkout -b release/vcluster/v{{ source "latestUpstreamRelease" }} v{{ source "latestUpstreamRelease" }}

        # Replay the COMPLETE set of (fork)-scoped commits from the previous
        # release line plus the loft-sh CI/release tooling snapshot. The previous
        # release branch is the authoritative inventory (see README "Replay rule"):
        #   git log --grep '(fork)' release/vcluster/<previous-version>

        # Push the branch and the first fork tag
        git push origin release/vcluster/v{{ source "latestUpstreamRelease" }}
        git tag v{{ source "latestUpstreamRelease" }}.vcluster.0
        git push origin v{{ source "latestUpstreamRelease" }}.vcluster.0
        ```

        Then create the GitHub Release from the `v{{ source "latestUpstreamRelease" }}.vcluster.0` tag.

        ---
        *Auto-generated by updatecli*
