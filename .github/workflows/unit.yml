name: Unit Test
on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5
    - name: Go Unit Tests
      run: go test -cover -tags=test ./...
    - name: Go Unit Tests (nocgo)
      run: go test -cover -tags=test ./...
      env:
        CGO_ENABLED: "0"

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: kine
          POSTGRES_DB: postgres
        ports:
        - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v5
    - name: Watch-gap regression test
      run: go test -count=1 -run TestWatchGapDoesNotStallPostgres ./pkg/endpoint/
      env:
        KINE_TEST_PG_DSN: postgres://postgres:kine@127.0.0.1:5432/postgres?sslmode=disable
