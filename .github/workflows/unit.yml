name: Unit Tests
on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".github/workflows/actionlint.yaml"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - ".github/workflows/actionlint.yaml"

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.25'


    - name: Go Unit Tests
      run: go test -cover -tags=test ./...
      env:
        CGO_ENABLED: "1"

    - name: Go Unit Tests nocgo
      run: go test -cover -tags=test ./...
      env:
        CGO_ENABLED: "0"

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: kine
          POSTGRES_DB: postgres
        ports:
        - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v5
    - name: Watch-gap regression test
      run: go test -count=1 -run TestWatchGapDoesNotStallPostgres ./pkg/endpoint/
      env:
        KINE_TEST_PG_DSN: postgres://postgres:kine@127.0.0.1:5432/postgres?sslmode=disable
