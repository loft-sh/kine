name: Version policy

# Validates that fork release tags follow the vX.Y.Z.vcluster.N scheme
# (see README "Fork policy"). This is a standalone check; the image build
# lives in the separate release.yaml workflow.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate release tag name
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag name
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_re='^v[0-9]+\.[0-9]+\.[0-9]+\.vcluster\.[0-9]+$'
          if [[ ! "$TAG" =~ $tag_re ]]; then
            echo "::error::Release tag '$TAG' does not match the required vX.Y.Z.vcluster.N scheme (e.g. v0.16.2.vcluster.0)."
            exit 1
          fi
          echo "Release tag '$TAG' OK."
