name: E2E (PostgreSQL)
on:
  pull_request:
    branches: [main, master]
    paths:
      - "pkg/drivers/pgsql/**"
      - "pkg/endpoint/**"
      - "pkg/app/**"
      - "pkg/drivers/config.go"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # The suite runs in the e2e/ module, which tracks the loft-sh e2e
      # toolchain (newer than the production module). Read its go.mod so the
      # correct Go toolchain is installed up front rather than auto-downloaded
      # mid-test.
      - uses: actions/setup-go@v5
        with:
          go-version-file: e2e/go.mod

      # Only the kind binary is needed; the suite drives it for cluster
      # lifecycle and accesses the cluster via client-go/controller-runtime.
      - name: Install kind
        run: go install sigs.k8s.io/kind@v0.30.0

      - name: Run e2e suite
        working-directory: e2e
        run: go test -timeout 25m -run TestRunKineE2E ./... -args --ginkgo.v
